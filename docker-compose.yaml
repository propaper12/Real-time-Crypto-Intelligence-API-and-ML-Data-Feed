version: '3.8'

services:
  # 1. ZOOKEEPER
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Xmx256m -Xms256m"
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 384m

  # 2. KAFKA
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 768m
    volumes:
      - kafka_data:/bitnami/kafka      

  # 3. MINIO (Lakehouse Storage)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    env_file: 
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 512m

  # 4. PRODUCER (BINANCE DATA)
  producer:
    build: .
    container_name: binance_producer
    restart: always
    depends_on: [kafka]
    env_file: 
      - .env
    command: python producer.py
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 256m

  # 5. SPARK CONSUMER (BRONZE LAYER)
  spark-consumer:
    build: .
    container_name: spark-consumer
    command: python consumer_lake.py
    restart: always 
    depends_on: [kafka, minio]
    env_file: 
      - .env
    environment:
      - SPARK_DRIVER_MEMORY=512m
      - SPARK_EXECUTOR_MEMORY=512m
    volumes:
      - ./checkpoints:/app/checkpoints
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 1g

  # 6. SPARK SILVER (PROCESSING LAYER)
  spark-silver:
    build: .
    container_name: spark-silver
    restart: always
    depends_on: [minio, spark-consumer]
    env_file: 
      - .env
    environment:
      - SPARK_MASTER=local[*]
      - SPARK_DRIVER_MEMORY=1g
      - SPARK_EXECUTOR_MEMORY=1g
    command: python process_silver.py
    volumes:
      - ./checkpoints_silver:/app/checkpoints_silver
      - ./:/app 
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'

  # 7. ML TRAINER (AUTO-ML ORCHESTRATOR)
  ml-trainer:
    build: .
    container_name: ml-trainer
    restart: always
    depends_on: [spark-silver]
    command: python ml_watcher.py  
    env_file: 
      - .env
    volumes:
      - ./:/app
      - ./models:/app/models
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 1g

  # 8. DASHBOARD (STREAMLIT UI)
  dashboard:
    build: .
    container_name: dashboard
    command: streamlit run dashboard_app/Home.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - minio
      - spark-silver
      - mlflow         
    env_file:          
      - .env
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dashboard_app:/app/dashboard_app
      
  # 9. POSTGRES (SERVING DB)
  postgres:
    image: postgres:15
    container_name: postgres
    env_file: 
      - .env
    ports: [ "5432:5432" ]
    networks: [ data-network ]
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 10. DBT
  dbt:
    build: ./dbt_project
    container_name: dbt_transformer
    command: >
      sh -c "tail -f /dev/null"
    depends_on:
      - postgres
    env_file: 
      - .env
    volumes:
      - ./dbt_project:/usr/app
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 256m

  # 11. API GATEWAY
  api-gateway:
    build: .
    container_name: api_gateway
    command: uvicorn ingestion_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on: [kafka]
    env_file: 
      - .env
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 256m

  # 12. CADVISOR
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 256m

  # 13. PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - cadvisor
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 512m

  # 14. GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    env_file: 
      - .env
    depends_on:
      - prometheus
    networks:
      - data-network
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256m
  
  # 15. MLFLOW SERVER
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: mlflow_server
    ports:
      - "5000:5000"
    env_file: 
      - .env
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root s3://market-data/mlflow-artifacts
      --host 0.0.0.0
    networks:
      - data-network
    depends_on:
      - minio
    deploy:
      resources:
        limits:
          memory: 512m

  # 16. METABASE
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3005:3000"
    env_file: 
      - .env
    networks:
      - data-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
  
  # 17. KAFKA CONNECT
  kafka-connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    container_name: kafka-connect
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - zookeeper
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka:9092"
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: "compose-connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "docker-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "docker-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "docker-connect-status"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_LISTENERS: "HTTP://0.0.0.0:8083"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
      CONNECT_LOG4J_ROOT_LOGLEVEL: "INFO"
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xms256M -Xmx512M"
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 1g
   
  # 18. KAFKA CONNECT UI
  kafka-connect-ui:
    image: landoop/kafka-connect-ui:0.9.7
    container_name: kafka-connect-ui
    ports:
      - "8003:8000"
    environment:
      - "CONNECT_URL=http://kafka-connect:8083"
      - "PROXY=true"
    depends_on:
      - kafka-connect
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 128m

  # 19. KAFDROP (Kafka UI)
  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    restart: always
    ports:
      - "9010:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"
      JVM_OPTS: "-Xms32M -Xmx128M"
      SERVER_SERVLET_CONTEXT_PATH: "/"
    depends_on:
      - kafka
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 256m

  # 20. OTOMATİK VERİTABANI KURUCU (DB-INIT)
  db-init:
    image: postgres:15
    container_name: db_init
    depends_on:
      - postgres
    networks:
      - data-network
    environment:
      PGPASSWORD: "SuperSecret_DB_Password_2026"
    command: >
      sh -c "
      echo 'Postgres bekleniyor...';
      sleep 10;
      psql -h postgres -U admin_lakehouse -d market_db -c '
      CREATE TABLE IF NOT EXISTS market_data (
          symbol VARCHAR(20),
          average_price DOUBLE PRECISION,
          predicted_price DOUBLE PRECISION,
          volatility DOUBLE PRECISION,
          processed_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );' && echo 'Tablo basariyla kuruldu!';
      "
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  data-network:
    driver: bridge

volumes:
  grafana_data:
  kafka_data:
  postgres_data:
