version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Xmx256m -Xms256m"
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 384m

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 768m
    volumes:
      - kafka_data:/bitnami/kafka      

  minio:
    image: minio/minio:latest
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    env_file: 
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 512m

  producer:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: binance_producer
    restart: always
    depends_on: [kafka]
    env_file: 
      - .env
    command: python producer.py
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 256m

  spark-consumer:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-consumer
    command: python consumer_lake.py
    restart: always 
    depends_on: [kafka, minio]
    env_file: 
      - .env
    environment:
      - SPARK_DRIVER_MEMORY=512m
      - SPARK_EXECUTOR_MEMORY=512m
    volumes:
      - ./checkpoints:/app/checkpoints
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 1g

  spark-silver:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-silver
    restart: always
    depends_on: [minio, spark-consumer]
    env_file: 
      - .env
    environment:
      - SPARK_MASTER=local[*]
      - SPARK_DRIVER_MEMORY=1g
      - SPARK_EXECUTOR_MEMORY=1g
    command: python process_silver.py
    volumes:
      - ./checkpoints_silver:/app/checkpoints_silver
      - ./:/app 
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'

  ml-trainer:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: ml-trainer
    restart: always
    depends_on: [spark-silver]
    command: python -u ml_watcher.py
    env_file: 
      - .env
    volumes:
      - ./:/app
      - ./models:/app/models
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 1g

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: dashboard
    command: streamlit run dashboard_app/Home.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - postgres
      - minio
      - spark-silver
      - mlflow         
    env_file:          
      - .env
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dashboard_app:/app/dashboard_app
      
  postgres:
    image: timescale/timescaledb-ha:pg15
    container_name: postgres
    env_file: 
      - .env
    ports: [ "5432:5432" ]
    networks: [ data-network ]
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dbt:
    build: ./dbt_project
    container_name: dbt_transformer
    command: >
      sh -c "tail -f /dev/null"
    depends_on:
      - postgres
    env_file: 
      - .env
    volumes:
      - ./dbt_project:/usr/app
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 256m

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api_gateway
    command: uvicorn ingestion_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on: [kafka]
    env_file: 
      - .env
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 256m

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlflow_server
    ports:
      - "5000:5000"
    env_file: 
      - .env
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root s3://market-data/mlflow-artifacts
      --host 0.0.0.0
    networks:
      - data-network
    depends_on:
      - minio
    deploy:
      resources:
        limits:
          memory: 512m

  adminer:
    image: adminer
    container_name: db_admin
    ports: [ "8080:8080" ]
    networks: [ data-network ]

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    restart: always
    ports:
      - "9010:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"
      JVM_OPTS: "-Xms32M -Xmx128M"
      SERVER_SERVLET_CONTEXT_PATH: "/"
    depends_on:
      - kafka
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 256m
  
  inference_api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: inference_api
    command: uvicorn inference_api:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    depends_on:
      - mlflow
      - minio
    env_file: 
      - .env
    networks:
      - data-network
    deploy:
      resources:
        limits:
          memory: 512m

  # 🔴 AKILLI DB-INIT V13: Postgres'i bekler ve tüm sütunları eksiksiz kurar
  db-init:
    image: postgres:15
    container_name: db_init
    depends_on:
      - postgres
    networks:
      - data-network
    environment:
      PGPASSWORD: "SuperSecret_DB_Password_2026"
    command: >
      sh -c "
      echo '🟢 Postgres sunucusunun hazir olmasi bekleniyor...';
      while ! psql -h postgres -U admin_lakehouse -d market_db -c 'select 1' > /dev/null 2>&1; do
        echo '⏳ Postgres hala basliyor, 3 saniye daha bekleniyor...';
        sleep 3;
      done;
      echo '🟢 Postgres Hazir! V13 God Mode Tablolari Kuruluyor...';
      psql -h postgres -U admin_lakehouse -d market_db -c \"
      CREATE TABLE IF NOT EXISTS market_data (
          symbol VARCHAR(20),
          average_price DOUBLE PRECISION,
          predicted_price DOUBLE PRECISION,
          volatility DOUBLE PRECISION,
          volume_usd DOUBLE PRECISION,    
          is_buyer_maker BOOLEAN,
          trade_side VARCHAR(10),
          cvd DOUBLE PRECISION DEFAULT 0,
          buy_wall_usd DOUBLE PRECISION DEFAULT 0,
          sell_wall_usd DOUBLE PRECISION DEFAULT 0,
          imbalance_ratio DOUBLE PRECISION DEFAULT 0,
          mark_price DOUBLE PRECISION DEFAULT 0,
          funding_rate DOUBLE PRECISION DEFAULT 0,
          liq_buy_usd DOUBLE PRECISION DEFAULT 0,
          liq_sell_usd DOUBLE PRECISION DEFAULT 0,
          vpin_score DOUBLE PRECISION DEFAULT 0,
          wall_imbalance DOUBLE PRECISION DEFAULT 0,
          processed_time TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP
      );
      CREATE EXTENSION IF NOT EXISTS timescaledb;
      SELECT create_hypertable('market_data', 'processed_time', if_not_exists => TRUE, migrate_data => TRUE);
      CREATE TABLE IF NOT EXISTS api_users (
          id SERIAL PRIMARY KEY,
          username VARCHAR(50) UNIQUE NOT NULL,
          email VARCHAR(255) UNIQUE NOT NULL,
          api_key VARCHAR(64) UNIQUE NOT NULL,
          tier VARCHAR(20) DEFAULT 'FREE',
          password_hash VARCHAR(256),
          created_at TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP
      );
      \" && echo '✅ V13 God Mode Tablolari Basariyla Kuruldu!';
      "
    deploy:
      resources:
        limits:
          memory: 128m

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports: ["6379:6379"]
    networks: [data-network]
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  data-network:
    driver: bridge

volumes:
  grafana_data:
  kafka_data:
  postgres_data: